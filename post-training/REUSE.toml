# REUSE.toml for post-training/
# See: https://reuse.software/spec-3.3/#reusetoml
#
# The repo-root REUSE.toml supplies the Apache-2.0 fall-through for any file
# without an in-file SPDX header. Entries below are precise overrides for
# derived/vendored files where the in-file SPDX header alone does not
# capture the full license picture (upstream copyright, dual-license
# expression).
#
# Paths are relative to this file (i.e. relative to post-training/).
# precedence = "aggregate" stacks TOML-declared SPDX-FileCopyrightText
# entries with in-file headers; precedence = "override" replaces.
#
# See also: post-training/THIRD_PARTY_NOTICES.md for the canonical
# component list with upstream URLs and use sites.

version = 1

# ---------------------------------------------------------------------------
# Empty package-init files — REUSE coverage via fall-through. The repo-wide
# top-level annotation already covers them as Apache-2.0; this entry exists
# for clarity so `reuse lint` doesn't flag bare __init__.py files.
# ---------------------------------------------------------------------------

[[annotations]]
path = "**/__init__.py"
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright (c) 2025 NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Self-Forcing (Apache-2.0) — vendored under third_party/self_forcing/
# ---------------------------------------------------------------------------

[[annotations]]
path = "omnidreams/_src/omnidreams/third_party/self_forcing/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright the Self-Forcing authors (Guande He et al., NeurIPS 2025)."
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# fvcore (Apache-2.0) — registry / lazy-instantiation pattern derived in
# imaginaire/lazy_config/. Facebook copyright preserved for the
# fvcore-derived parts; NVIDIA modifications under Apache-2.0.
# ---------------------------------------------------------------------------

[[annotations]]
path = "omnidreams/_src/imaginaire/lazy_config/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright (c) Facebook, Inc. and its affiliates."
SPDX-License-Identifier = "Apache-2.0"

