# OpenAI CLIP + mlfoundations open_clip (MIT) — modified in
# predict2/networks/clip.py. NVIDIA modifications relicensed under
# Apache-2.0 per MIT permission; upstream notice preserved.
# ---------------------------------------------------------------------------

[[annotations]]
