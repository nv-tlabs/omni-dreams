# Fast pre-commit hook for the interactive-drive subproject: ruff lint, ruff format
# check, and pyright. Tests are NOT run here (the headless UI smoke test takes
# ~8s and would train people to use --no-verify). Run `./scripts/check.sh`
# before pushing / opening a PR to exercise pytest as well.
#
# Install once from the git repo root:
#   uv run --directory samples/interactive-drive pre-commit install \
#       --config samples/interactive-drive/.pre-commit-config.yaml
#
# Uninstall:
#   pre-commit uninstall

files: ^samples/interactive-drive/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      # ``uv run --no-sync`` skips the implicit ``uv sync`` that ``uv run``
      # otherwise performs on every invocation. The hooks should validate the
      # code being committed, not re-resolve and re-install the venv on every
      # commit; ``scripts/check.sh`` is the canonical full check and still
      # goes through plain ``uv run`` so it does pick up dep changes.
      - id: ruff-check
        name: ruff check
        language: system
        entry: bash -c 'cd samples/interactive-drive && uv run --no-sync --extra dev ruff check .'
        types_or: [python, pyi]
        pass_filenames: false

      - id: ruff-format
        name: ruff format --check
        language: system
        entry: bash -c 'cd samples/interactive-drive && uv run --no-sync --extra dev ruff format --check .'
        types_or: [python, pyi]
        pass_filenames: false

      - id: pyright
        name: pyright
        language: system
        entry: bash -c 'cd samples/interactive-drive && uv run --no-sync --extra dev --extra ui --extra world-model pyright'
        types_or: [python, pyi]
        pass_filenames: false
