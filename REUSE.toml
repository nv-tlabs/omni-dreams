# REUSE.toml for NVIDIA OmniDreams
# See: https://reuse.software/spec-3.3/#reusetoml
#
# This file complements per-file SPDX headers. Per-file headers are the
# authoritative attribution; the [[annotations]] entries below provide
# fall-through licensing for files where an in-file header is impractical
# (binary assets, generated lock files, IDE/editor configs) and for
# subtrees that are NVIDIA-internal-only.

version = 1

# ---------------------------------------------------------------------------
# Project-wide fallthrough — Apache-2.0 with NVIDIA copyright. Per-file
# SPDX headers (where present) take precedence over this annotation.
# ---------------------------------------------------------------------------

[[annotations]]
path = "**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright (c) 2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# samples/** — public-release sample integrations. NVIDIA-authored,
# Apache-2.0. Per-file SPDX headers are present on source files; this entry
# stacks for clarity and to explicitly mark the sample subtrees in the REUSE
# manifest.
# ---------------------------------------------------------------------------

[[annotations]]
path = "samples/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright (c) 2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# internal/ and .gitlab-ci.yml — NVIDIA-internal CI configuration and
# gitlab→github sync helpers. Excluded from the public mirror by
# internal/sync_to_github.sh's rsync excludes; not part of the OSS release.
# ---------------------------------------------------------------------------

[[annotations]]
path = ["internal/**", ".gitlab-ci.yml"]
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "LicenseRef-NvidiaProprietary"
